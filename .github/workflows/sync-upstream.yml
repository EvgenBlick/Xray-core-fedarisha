name: Sync main with upstream

# Keeps `main` current with XTLS/Xray-core:main by MERGING upstream into it
# (same model as GitHub's "Sync fork" button — no history rewrite, no force
# push, so the two never fight). Merges only when upstream moved; aborts
# loudly on conflict or build failure so it never pushes a broken main.
# Release tags live on their own commits off main and are untouched.

on:
  schedule:
    - cron: '17 4 * * *'   # daily, 04:17 UTC
  workflow_dispatch:        # allow manual run

concurrency:
  group: sync-upstream
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main (full history)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          # Push via a repo-scoped write deploy key (SSH), NOT the default
          # GITHUB_TOKEN. The built-in App token is forbidden from pushing changes
          # to .github/workflows/* files, which upstream edits regularly; a deploy
          # key is exempt and is scoped to this repo only (no account-wide token,
          # no expiry). Requires deploy keys to be enabled on the Fedarisha org.
          ssh-key: ${{ secrets.SYNC_SSH_KEY }}
          persist-credentials: true

      - name: Configure git identity
        run: |
          git config user.name  "fedarisha-sync-bot"
          git config user.email "actions@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/XTLS/Xray-core.git
          git fetch --no-tags upstream main

      # Go is set up BEFORE the merge because the merge step may need
      # `go mod tidy` to auto-resolve go.mod/go.sum conflicts (see below).
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          check-latest: true

      - name: Merge upstream/main into main
        id: merge
        run: |
          if git merge-base --is-ancestor upstream/main HEAD; then
            echo "main already contains upstream/main tip — nothing to do."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "Merging upstream/main ($(git rev-parse --short upstream/main))..."
          if git merge --no-edit upstream/main; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Merge stopped on conflict. The overwhelmingly common case is a
          # purely textual clash in go.mod (upstream bumps a shared dep on a
          # line adjacent to a fedarisha-added require). Those are safe to
          # resolve mechanically: take upstream's go.mod and let `go mod tidy`
          # re-derive the union from the actual import graph — it re-adds every
          # fed dependency and keeps upstream's version bumps. The `go build`
          # gate below still guards against a bad result. ANY conflict outside
          # go.mod/go.sum touches real source and must be resolved by a human,
          # so we abort loudly in that case.
          conflicts="$(git diff --name-only --diff-filter=U)"
          echo "Conflicted paths:"; echo "$conflicts"
          if echo "$conflicts" | grep -qvE '^(go\.mod|go\.sum)$'; then
            git merge --abort || true
            echo "::error::Merge conflicts in source files — manual sync required (see conflicted paths above)."
            exit 1
          fi
          echo "Only go.mod/go.sum conflicted — auto-resolving via 'go mod tidy'."
          git show upstream/main:go.mod > go.mod
          go mod tidy
          git add go.mod go.sum
          git commit --no-edit
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Build check (do not push a broken main)
        if: steps.merge.outputs.changed == 'true'
        run: go build ./...

      - name: Push synced main
        if: steps.merge.outputs.changed == 'true'
        run: git push origin main
